<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calorie Counter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Calorie Counter</h1>

    <input id="foodName" type="text" placeholder="Food name">
    <input id="calories" type="number" placeholder="Calories">

    <button id="addBtn">Add Food</button>

    <ul id="foodList"></ul>

    <p>Total Calories: <span id="total">0</span></p>

    <p>Goal Progress:</p>
    <div id="barContainer">
        <div id="bar"></div>
    </div>

    <button id="resetBtn">Reset</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
